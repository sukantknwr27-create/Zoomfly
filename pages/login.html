<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg"/>
  <link rel="shortcut icon" href="/assets/favicon.svg"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In — ZoomFly</title>
  <meta name="description" content="Sign in or create your free ZoomFly account to book trips, track bookings, and earn rewards."/>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <link rel="stylesheet" href="/assets/css/premium.css"/>
  <link rel="stylesheet" href="/assets/css/pages.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#F3F2EE;color:#1C2340}
    .auth-wrap{min-height:calc(100vh - 300px);display:flex;align-items:center;justify-content:center;padding:60px 20px}
    .auth-card{background:#fff;border:1px solid #E4E8EF;border-radius:18px;box-shadow:0 16px 48px rgba(12,27,51,.10);max-width:440px;width:100%;padding:36px 34px}
    .auth-head{text-align:center;margin-bottom:26px}
    .auth-head h1{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:600;color:#0C1B33;margin-bottom:6px}
    .auth-head p{font-size:.88rem;color:#8896AB}
    .auth-tabs{display:flex;background:#F3F2EE;border-radius:100px;padding:4px;margin-bottom:24px}
    .auth-tab{flex:1;text-align:center;padding:10px;font-size:.85rem;font-weight:700;color:#8896AB;cursor:pointer;border-radius:100px;transition:all .2s;font-family:'Space Grotesk',system-ui}
    .auth-tab.active{background:#C9922A;color:#fff}
    .form-group{margin-bottom:16px}
    .form-label{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#8896AB;margin-bottom:6px}
    .form-input{width:100%;padding:.75rem .9rem;border:1.5px solid #E4E8EF;border-radius:10px;font-size:.92rem;font-family:'Inter',system-ui;color:#1C2340}
    .form-input:focus{outline:none;border-color:#C9922A;box-shadow:0 0 0 3px rgba(201,146,42,.12)}
    .auth-btn{width:100%;padding:.9rem;background:#C9922A;color:#fff;border:none;border-radius:100px;font-family:'Space Grotesk',system-ui;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .2s}
    .auth-btn:hover{background:#A37220}
    .auth-btn:disabled{background:#d4c19b;cursor:not-allowed}
    .auth-msg{font-size:.82rem;padding:.7rem .9rem;border-radius:8px;margin-bottom:14px;display:none}
    .auth-msg.error{display:block;background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
    .auth-msg.success{display:block;background:#ECFDF5;color:#059669;border:1px solid #A7F3D0}
    .auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#8896AB;font-size:.75rem}
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:#E4E8EF}
    .btn-google{width:100%;padding:.8rem;background:#fff;border:1.5px solid #E4E8EF;border-radius:100px;font-family:'Space Grotesk',system-ui;font-size:.88rem;font-weight:700;color:#1C2340;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
    .btn-google:hover{border-color:#C9922A}
    .auth-foot{text-align:center;margin-top:18px;font-size:.8rem;color:#8896AB}
    .auth-foot a{color:#C9922A;font-weight:700}
  </style>
</head>
<body data-page="login">
<header class="nav" id="mainNav"></header>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-head">
      <h1>Welcome to <em style="font-style:italic;color:#C9922A">ZoomFly</em></h1>
      <p>Sign in to book trips, track bookings and earn rewards.</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
      <div class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Create Account</div>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="auth-msg" id="login-msg"></div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="auth-btn" id="login-btn" onclick="handleLogin()">Sign In</button>
      <div style="text-align:right;margin-top:10px;">
        <a href="#" onclick="handleForgotPassword();return false" style="font-size:.8rem;color:#C9922A;">Forgot password?</a>
      </div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signup-form" style="display:none">
      <div class="auth-msg" id="signup-msg"></div>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-input" type="text" id="reg-name" placeholder="Rahul Sharma" autocomplete="name"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="reg-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input class="form-input" type="tel" id="reg-phone" placeholder="9876543210" autocomplete="tel"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="reg-pass" placeholder="At least 8 characters" autocomplete="new-password"/>
      </div>
      <button class="auth-btn" id="signup-btn" onclick="handleSignup()">Create Account</button>
    </div>

    <div class="auth-divider">OR</div>
    <button class="btn-google" onclick="handleGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.66-2.25 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.85A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.09A6.6 6.6 0 0 1 5.5 12c0-.73.13-1.43.34-2.09V7.06H2.18A11 11 0 0 0 1 12c0 1.77.42 3.45 1.18 4.94z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1a11 11 0 0 0-9.82 6.06l3.66 2.85C6.71 7.31 9.14 5.38 12 5.38z"/></svg>
      Continue with Google
    </button>

    <p class="auth-foot" id="switch-hint">Don't have an account? <a href="#" onclick="switchTab('signup');return false">Create one</a></p>
  </div>
</div>

<section class="newsletter" id="newsletter"></section>
<footer class="footer" id="mainFooter"></footer>
<script src="/assets/js/main.js"></script>
<script type="module">
import { signIn, signUp, signInWithGoogle, getUser } from '../assets/js/supabase.js';

const params   = new URLSearchParams(location.search);
const redirect = params.get('redirect') || params.get('next') || '/pages/dashboard.html';

// Already signed in? Don't show the login form — go straight where they were headed.
getUser().then(user => { if (user) window.location.replace(redirect); }).catch(() => {});

if (params.get('tab') === 'signup') switchTab('signup');

function showMsg(el, text, type) {
  el.textContent = text;
  el.className = 'auth-msg ' + type;
}

window.switchTab = (tab) => {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('login-form').style.display  = tab === 'login'  ? 'block' : 'none';
  document.getElementById('signup-form').style.display  = tab === 'signup' ? 'block' : 'none';
  document.getElementById('switch-hint').innerHTML = tab === 'login'
    ? `Don't have an account? <a href="#" onclick="switchTab('signup');return false">Create one</a>`
    : `Already have an account? <a href="#" onclick="switchTab('login');return false">Sign in</a>`;
};

window.handleLogin = async () => {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const msg   = document.getElementById('login-msg');
  msg.className = 'auth-msg';

  if (!email || !pass) { showMsg(msg, 'Please fill in both fields.', 'error'); return; }

  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    await signIn({ email, password: pass });
    window.location.href = redirect;
  } catch (e) {
    showMsg(msg, e.message || 'Could not sign in. Please check your details.', 'error');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
};

window.handleSignup = async () => {
  const fullName = document.getElementById('reg-name').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const phone    = document.getElementById('reg-phone').value.trim();
  const pass     = document.getElementById('reg-pass').value;
  const btn      = document.getElementById('signup-btn');
  const msg      = document.getElementById('signup-msg');
  msg.className = 'auth-msg';

  if (!fullName || !email || !pass) { showMsg(msg, 'Please fill in name, email and password.', 'error'); return; }
  if (pass.length < 8) { showMsg(msg, 'Password must be at least 8 characters.', 'error'); return; }

  btn.disabled = true; btn.textContent = 'Creating account…';
  try {
    await signUp({ email, password: pass, fullName, phone });
    showMsg(msg, 'Account created! Check your email to verify, then sign in.', 'success');
    btn.disabled = false; btn.textContent = 'Create Account';
    setTimeout(() => switchTab('login'), 1800);
  } catch (e) {
    showMsg(msg, e.message || 'Could not create your account.', 'error');
    btn.disabled = false; btn.textContent = 'Create Account';
  }
};

window.handleForgotPassword = async () => {
  const email = document.getElementById('login-email').value.trim();
  const msg   = document.getElementById('login-msg');
  msg.className = 'auth-msg';
  if (!email) { showMsg(msg, 'Enter your email above first.', 'error'); return; }
  try {
    const { supabase } = await import('../assets/js/supabase.js');
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/pages/login.html'
    });
    if (error) throw error;
    showMsg(msg, 'Reset link sent to ' + email, 'success');
  } catch (e) {
    showMsg(msg, e.message || 'Could not send reset email.', 'error');
  }
};

window.handleGoogle = async () => {
  try { await signInWithGoogle(); }
  catch (e) { showMsg(document.getElementById('login-msg'), e.message || 'Google sign-in failed.', 'error'); }
};
</script>
</body>
</html>
