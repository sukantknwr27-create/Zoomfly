    .search-bar{max-width:500px;margin:0 auto;position:relative}

    .dest-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem;padding:2.5rem 0}

    .dest-card:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,.12);border-color:transparent}
    .dest-thumb{height:180px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .dest-thumb .emoji{font-size:5rem;position:relative;z-index:1}
    .dest-badge{position:absolute;top:.75rem;left:.75rem;background:rgba(0,0,0,.5);color:#fff;font-size:.7rem;font-weight:700;padding:.25rem .65rem;border-radius:50px;text-transform:uppercase;letter-spacing:.05em}
    .dest-body{padding:1.25rem}
    .dest-name{font-size:1.1rem;font-weight:800;margin-bottom:.2rem}
    .dest-tagline{font-size:.82rem;color:#64748b;margin-bottom:.75rem}
    .dest-meta{display:flex;justify-content:space-between;align-items:center}
    .dest-from{font-size:.78rem;color:#94a3b8}
    .dest-price{font-size:1rem;font-weight:800;color:var(--blue)}
    .dest-tags{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.75rem}
    .dtag{font-size:.7rem;font-weight:600;padding:.2rem .55rem;border-radius:50px;background:#f1f5f9;color:#475569}
    .dest-cta{display:flex;gap:.5rem;margin-top:.85rem}
    .btn-view{flex:1;padding:.5rem;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer}
    .btn-wa{flex:1;padding:.5rem;background:#25D366;color:#fff;border:none;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer}
    .no-results{text-align:center;padding:4rem 1rem;color:#94a3b8}
    .no-results .icon{font-size:4rem;margin-bottom:1rem}
    .count-bar{padding:1rem 0;color:#64748b;font-size:.875rem}
    @media(max-width:1100px){.dest-grid{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:768px){.dest-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:480px){.dest-grid{grid-template-columns:1fr}}

let activeFilter = 'all';
let searchTerm = '';

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.fchip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function filterDests() {
  searchTerm = document.getElementById('dest-search').value.toLowerCase();
  render();
}

function render() {
  let data = DESTINATIONS.filter(d => {
    if (activeFilter !== 'all' && activeFilter !== d.type && !d.categories.includes(activeFilter)) return false;
    if (searchTerm && !d.name.toLowerCase().includes(searchTerm) && !d.tagline.toLowerCase().includes(searchTerm) && !d.country.toLowerCase().includes(searchTerm) && !d.tags.some(t => t.toLowerCase().includes(searchTerm))) return false;
    return true;
  });

  document.getElementById('count-bar').textContent = `Showing ${data.length} destination${data.length !== 1 ? 's' : ''}`;
  const grid = document.getElementById('dest-grid');
  const noRes = document.getElementById('no-results');

  if (!data.length) { grid.innerHTML = ''; noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';

  grid.innerHTML = data.map((d, i) => `
    <div class="dest-card reveal" style="transition-delay:${(i % 4) * 60}ms">
      <div class="dest-thumb" style="background:${d.bg}">
        <span class="emoji">${d.emoji}</span>
        <span class="dest-badge">${d.type === 'international' ? '🌍 International' : '🇮🇳 Domestic'}</span>
      </div>
      <div class="dest-body">
        <div class="dest-name">${d.name}${d.country !== 'India' ? ` <span style="font-size:.75rem;color:#94a3b8">${d.country}</span>` : ''}</div>
        <div class="dest-tagline">${d.tagline}</div>
        <div class="dest-tags">${d.tags.slice(0,3).map(t => `<span class="dtag">${t}</span>`).join('')}</div>
        <div style="font-size:.8rem;color:#64748b;margin-bottom:.75rem;line-height:1.5">${d.desc.substring(0,100)}…</div>
        <div class="dest-meta">
          <span class="dest-from">📅 Best: ${d.best}</span>
          <span class="dest-price">From ₹${d.from.toLocaleString('en-IN')}</span>
        </div>
        <div class="dest-cta">
          <button class="btn-view" onclick="viewPackages('${d.name}')">View Packages</button>
          <button class="btn-wa" onclick="waEnquire('${d.name}')">💬 WhatsApp</button>
        </div>
      </div>
    </div>
  `).join('');

  // Re-trigger reveal animations
  setTimeout(() => document.querySelectorAll('.dest-card.reveal').forEach(el => el.classList.add('visible')), 50);
}

function viewPackages(name) {
  window.location.href = `/pages/packages.html?search=${encodeURIComponent(name)}`;
}

function waEnquire(name) {
  const msg = `Hi ZoomFly! 🌍 I'm interested in a trip to ${name}. Please share available packages and pricing.`;
  window.open('https://wa.me/918076136300?text=' + encodeURIComponent(msg), '_blank');
}

render();
</script>
