<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg"/>
  <link rel="shortcut icon" href="/assets/favicon.svg"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Dashboard — ZoomFly</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --primary:#C9922A;--primary-dark:#A37220;--primary-light:#F5E6C4;
      --accent:#E8B84B;--text:#1C2340;--text-muted:#4A5568;--text-light:#8896AB;
      --bg:#F3F2EE;--bg-white:#FFFFFF;--border:#E4E8EF;
      --success:#059669;--success-bg:#ECFDF5;--warning:#D97706;--warning-bg:#FFFBEB;
      --error:#DC2626;--error-bg:#FEF2F2;
      --shadow-sm:0 1px 3px rgba(0,0,0,0.07);--shadow:0 4px 12px rgba(0,0,0,0.08);
      --radius:12px;--radius-sm:8px;--font:'Inter',system-ui,sans-serif;
    }
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
    a{text-decoration:none;color:inherit}

    /* NAV */
    nav{background:#0C1B33;border-bottom:1px solid rgba(255,255,255,0.08);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(12,27,51,0.2)}
    .nav-logo{font-size:1.4rem;font-weight:900;color:#fff;font-family:'Space Grotesk',system-ui}.nav-logo span{color:#E8B84B}
    .nav-right{display:flex;align-items:center;gap:1rem}
    .user-pill{display:flex;align-items:center;gap:0.6rem;padding:0.4rem 0.85rem 0.4rem 0.5rem;border:1px solid rgba(255,255,255,0.2);border-radius:50px;font-size:0.875rem;font-weight:600;cursor:pointer;color:rgba(255,255,255,0.85)}
    .user-avatar{width:30px;height:30px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700}
    .btn-logout{font-size:0.8rem;color:rgba(255,255,255,0.65);font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,0.2);background:none;padding:0.4rem 0.75rem;border-radius:50px;transition:all .2s}.btn-logout:hover{color:#fff;border-color:rgba(255,255,255,0.5)}

    /* LAYOUT */
    .dash-layout{max-width:1100px;margin:0 auto;padding:2rem;display:grid;grid-template-columns:220px 1fr;gap:2rem;align-items:start}
    
    /* SIDEBAR */
    .dash-sidebar{position:sticky;top:80px}
    .user-card{background:#0C1B33;border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);padding:1.5rem;text-align:center;margin-bottom:1rem;box-shadow:0 4px 16px rgba(12,27,51,0.15)}
    .user-big-avatar{width:64px;height:64px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;margin:0 auto 0.75rem}
    .user-name{font-size:1rem;font-weight:700;margin-bottom:0.2rem;color:#fff;font-family:'Space Grotesk',system-ui}
    .user-email{font-size:0.78rem;color:rgba(255,255,255,0.55)}
    .user-since{font-size:0.72rem;color:rgba(255,255,255,0.38);margin-top:0.35rem}
    .dash-nav{background:#0C1B33;border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius);overflow:hidden;box-shadow:0 4px 16px rgba(12,27,51,0.15)}
    .dash-nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.85rem 1.25rem;font-size:0.875rem;font-weight:500;color:rgba(255,255,255,0.52);cursor:pointer;border-left:3px solid transparent;transition:all 0.15s;font-family:'Space Grotesk',system-ui}
    .dash-nav-item:hover{background:var(--bg);color:var(--text)}
    .dash-nav-item.active{color:var(--primary);background:var(--primary-light);border-left-color:var(--primary);font-weight:600}
    .dash-nav-item .icon{font-size:1rem;width:18px;text-align:center}
    .dash-nav-item .count{margin-left:auto;background:var(--primary);color:white;font-size:0.65rem;font-weight:700;padding:0.1rem 0.45rem;border-radius:50px}

    /* MAIN */
    .dash-main{}
    .section{display:none;animation:fadeIn 0.25s ease}
    .section.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

    /* STAT CARDS */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
    .stat-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;box-shadow:0 2px 10px rgba(12,27,51,0.07);transition:all .25s}.stat-card:hover{box-shadow:0 8px 28px rgba(12,27,51,0.11);transform:translateY(-2px)}
    .stat-icon{font-size:1.5rem;margin-bottom:0.5rem}
    .stat-val{font-size:1.5rem;font-weight:800;color:var(--text)}
    .stat-lbl{font-size:0.75rem;color:var(--text-muted)}

    /* SECTION HEADER */
    .sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
    .sec-hdr h2{font-size:1.05rem;font-weight:700}
    
    /* BOOKINGS */
    .booking-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:0 2px 10px rgba(12,27,51,0.07);display:flex;gap:1.25rem;align-items:flex-start;transition:all .25s}.booking-card:hover{box-shadow:0 8px 28px rgba(12,27,51,0.10);border-color:rgba(201,146,42,0.25)}
    .booking-emoji{width:52px;height:52px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.75rem;flex-shrink:0}
    .booking-info{flex:1}
    .booking-title{font-size:0.95rem;font-weight:700;margin-bottom:0.2rem}
    .booking-meta{font-size:0.78rem;color:var(--text-muted);display:flex;flex-wrap:wrap;gap:0.75rem;margin-bottom:0.5rem}
    .booking-ref{font-size:0.72rem;font-family:monospace;color:var(--primary);font-weight:700;background:var(--primary-light);padding:0.15rem 0.5rem;border-radius:4px}
    .booking-right{text-align:right;flex-shrink:0}
    .booking-amount{font-size:1.15rem;font-weight:800;color:var(--primary);margin-bottom:0.35rem}
    .status-pill{display:inline-block;padding:0.2rem 0.65rem;border-radius:50px;font-size:0.7rem;font-weight:700}
    .s-confirmed{background:var(--success-bg);color:var(--success)}
    .s-pending{background:var(--warning-bg);color:var(--warning)}
    .s-cancelled{background:var(--error-bg);color:var(--error)}
    .btn-cancel-booking{margin-top:0.5rem;font-size:0.72rem;color:var(--error);border:1px solid var(--error);background:none;padding:0.25rem 0.65rem;border-radius:50px;cursor:pointer;font-weight:600}

    /* WISHLIST */
    .wishlist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
    .wish-card{background:white;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;box-shadow:var(--shadow-sm);transition:box-shadow 0.2s}
    .wish-card:hover{box-shadow:var(--shadow)}
    .wish-thumb{height:110px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;position:relative}
    .wish-body{padding:0.85rem}
    .wish-title{font-size:0.875rem;font-weight:700;margin-bottom:0.25rem}
    .wish-price{font-size:1rem;font-weight:800;color:var(--primary)}
    .wish-remove{position:absolute;top:0.5rem;right:0.5rem;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.9);border:none;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center}

    /* PROFILE FORM */
    .profile-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;box-shadow:var(--shadow-sm)}
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;font-size:0.8rem;font-weight:600;margin-bottom:0.35rem;color:var(--text)}
    .fc{width:100%;padding:0.65rem 0.9rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;font-family:var(--font);color:var(--text);background:white;transition:border-color 0.2s}
    .fc:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,87,255,0.1)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.85rem}
    .btn-save{padding:0.7rem 1.75rem;background:var(--primary);color:white;border:none;border-radius:var(--radius-sm);font-size:0.9rem;font-weight:700;cursor:pointer;transition:background 0.2s}
    .btn-save:hover{background:var(--primary-dark)}

    /* EMPTY STATE */
    .empty{text-align:center;padding:3.5rem 1rem;color:var(--text-muted)}
    .empty .icon{font-size:3rem;margin-bottom:0.85rem}
    .empty h3{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:0.4rem}
    .btn-explore{display:inline-block;margin-top:1rem;padding:0.65rem 1.5rem;background:var(--primary);color:white;border-radius:50px;font-weight:700;font-size:0.875rem}

    /* TOAST */
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;padding:0.75rem 1.25rem;border-radius:var(--radius-sm);font-size:0.875rem;font-weight:600;color:white;box-shadow:var(--shadow);display:none;animation:slideUp 0.3s ease}
    .toast.show{display:block}
    .toast.success{background:var(--success)}
    .toast.error{background:var(--error)}
    @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

    /* LOADING */
    .spinner-wrap{text-align:center;padding:3rem;color:var(--text-muted)}
    .spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:768px){.dash-layout{grid-template-columns:1fr}.dash-sidebar{position:static}.stats-row{grid-template-columns:1fr 1fr}.booking-card{flex-direction:column}.form-row{grid-template-columns:1fr}}
  </style>
<script>
window.getAgentCode=function(){const m=document.cookie.match(/zf_agent=([^;]+)/);return m?m[1]:null;};
</script>

<nav>

<div class="dash-layout">

        <div class="stat-card"><div class="stat-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#C9922A" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5L16 9"/></svg></div><div class="stat-val" id="stat-spent">—</div><div class="stat-lbl">Total Spent</div></div>

      <div class="sec-hdr"><h2>Recent Bookings</h2><a href="#" onclick="showSection('bookings',document.querySelector('[onclick*=bookings]'))" style="font-size:0.8rem;color:var(--primary);font-weight:600">View All →</a></div>

    <!-- WISHLIST -->
    <div class="section" id="section-wishlist">

    <!-- PROFILE -->

            </button>
            <button type="button" class="gender-btn" id="g-female" onclick="selectGender('female')" style="flex:1;padding:0.7rem;border:2px solid var(--border);border-radius:10px;background:white;cursor:pointer;font-size:0.9rem;font-weight:600;display:flex;align-items:center;justify-content:center;gap:0.5rem;transition:all 0.2s">

  </div>

<div class="toast" id="toast"></div>

<script type="module">
import {
  supabase, getUser, getProfile, updateProfile,
  getMyBookings, cancelBooking,
  getWishlist, removeFromWishlist,
  signOut, requireAuth
} from '../assets/js/supabase.js';

// ── Guard ──
const user = await requireAuth();
if (!user) throw new Error('redirect');

let profile = null;
let bookings = [];
let wishlist = [];

// ── Init ──
async function init() {
  try {
    // Load each independently so one failure doesn't block others
    profile = await getProfile().catch(() => null);
    bookings = await getMyBookings().catch(() => []);
    wishlist = await getWishlist().catch(() => []);
    renderNav();
    renderStats();
    renderRecentBookings();
    renderBookings();
    renderWishlist();
    populateProfile();
  } catch (e) {
    console.error('Dashboard init error:', e);
    // Still render what we can
    try { renderNav(); } catch(_) {}
    try { renderStats(); } catch(_) {}
    try { renderRecentBookings(); } catch(_) {}
    try { populateProfile(); } catch(_) {}
  }
}

function renderNav() {
  const initials = (profile?.full_name || user.email || '?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  document.getElementById('nav-avatar').textContent = initials;
  document.getElementById('nav-name').textContent = profile?.full_name || user.email;
  document.getElementById('profile-avatar').textContent = initials;
  document.getElementById('profile-name').textContent = profile?.full_name || 'Traveller';
  document.getElementById('profile-email').textContent = user.email;
  document.getElementById('profile-since').textContent = 'Member since ' + new Date(user.created_at).toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  document.getElementById('booking-count').textContent = bookings.length;
}

function renderStats() {
  document.getElementById('stat-bookings').textContent = bookings.length;
  const spent = bookings.filter(b=>b.payment_status==='paid').reduce((s,b)=>s+Number(b.total_amount),0);
  document.getElementById('stat-spent').textContent = spent > 0 ? '₹'+spent.toLocaleString('en-IN') : '₹0';
  document.getElementById('stat-wishlist').textContent = wishlist.length;
}

function bookingCard(b, showCancel = true) {
  const typeIcons = {
    package: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0C1B33" stroke-width="1.5"><path d="M21 8 12 3 3 8l9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8M12 13v8"/></svg>',
    hotel:   '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0C1B33" stroke-width="1.5"><path d="M3 21V7a2 2 0 0 1 2-2h4v16M15 21V9a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v12M3 21h18M9 8h.01M9 12h.01M9 16h.01"/></svg>',
    flight:  '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0C1B33" stroke-width="1.5"><path d="M17.8 19.2 16 11l3.5-3.5c.6-.6.9-1.5.7-2.3-.2-.9-.9-1.5-1.7-1.7-.8-.2-1.7.1-2.3.7L13 7.5 4.8 5.7c-.5-.1-1 0-1.3.4l-.6.6c-.4.4-.3 1 .2 1.3L9 10.9l-3 3-2.3-.5c-.3-.1-.6 0-.8.2l-.4.4c-.3.3-.3.9.1 1.1l3.4 2 2 3.4c.2.4.8.4 1.1.1l.4-.4c.2-.2.3-.5.2-.8l-.5-2.3 3-3 2.9 6.8c.3.5.9.6 1.3.2l.6-.6c.4-.3.5-.8.4-1.3z"/></svg>',
    bus:     '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0C1B33" stroke-width="1.5"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M3 12h18M7 20v-3M17 20v-3"/></svg>',
    cab:     '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0C1B33" stroke-width="1.5"><path d="M5 17h14M5 17a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM19 17a2 2 0 1 0 4 0 2 2 0 0 0-4 0zM3 17V11l2-5h14l2 5v6"/></svg>',
    train:   '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0C1B33" stroke-width="1.5"><rect x="5" y="3" width="14" height="12" rx="3"/><path d="M5 11h14M8 19l-2 3M16 19l2 3"/></svg>',
  };
  const icon = typeIcons[b.booking_type] || typeIcons.package;
  const title = b.packages?.title || b.hotels?.name || `${b.booking_type} Booking`;
  const bg = b.booking_type === 'package' ? '#F5E6C4' : '#ECFDF5';
  const statusCls = { confirmed:'s-confirmed', pending:'s-pending', cancelled:'s-cancelled' }[b.status] || 's-pending';
  const date = b.travel_date || b.checkin_date || b.created_at;
  return `
  <div class="booking-card">
    <div class="booking-emoji" style="background:${bg}">${icon}</div>
    <div class="booking-info">
      <div class="booking-title">${title}</div>
      <div class="booking-meta">
        <span>${date ? new Date(date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—'}</span>
        <span>${b.num_guests} guest${b.num_guests!==1?'s':''}</span>
        <span class="booking-ref">${b.booking_ref}</span>
      </div>
      ${showCancel && b.status === 'confirmed' ? `<button class="btn-cancel-booking" onclick="window.cancelBook('${b.id}')">Cancel Booking</button>` : ''}
    </div>
    <div class="booking-right">
      <div class="booking-amount">₹${Number(b.total_amount).toLocaleString('en-IN')}</div>
      <span class="status-pill ${statusCls}">${b.status.charAt(0).toUpperCase()+b.status.slice(1)}</span>
    </div>
  </div>`;
}

function renderRecentBookings() {
  const wrap = document.getElementById('recent-bookings-wrap');
  if (!bookings.length) {
    wrap.innerHTML = `<div class="empty"><div class="icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#C9922A" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5L16 9"/></svg></div><h3>No bookings yet</h3><p>Your confirmed trips will appear here.</p><a href="packages.html" class="btn-explore">Browse Packages</a></div>`;
    return;
  }
  wrap.innerHTML = bookings.slice(0,3).map(b => bookingCard(b, false)).join('');
}

function renderBookings() {
  const wrap = document.getElementById('bookings-wrap');
  if (!bookings.length) {
    wrap.innerHTML = `<div class="empty"><div class="icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#C9922A" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5L16 9"/></svg></div><h3>No bookings yet</h3><p>Time to plan your first trip!</p><a href="packages.html" class="btn-explore">Browse Packages</a></div>`;
    return;
  }
  wrap.innerHTML = bookings.map(b => bookingCard(b)).join('');
}

function renderWishlist() {
  const wrap = document.getElementById('wishlist-wrap');
  if (!wishlist.length) {
    wrap.innerHTML = `<div class="empty"><div class="icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#C9922A" stroke-width="1.5"><path d="M9 14V4a2 2 0 0 1 4 0v10M9 14a2 2 0 1 0 4 0M9 14H5a2 2 0 0 0-2 2v1a5 5 0 0 0 5 5h8a5 5 0 0 0 5-5v-1a2 2 0 0 0-2-2h-4"/></svg></div><h3>No saved packages</h3><p>Tap the heart icon on any package to save it here.</p><a href="packages.html" class="btn-explore">Browse Packages</a></div>`;
    return;
  }
  wrap.innerHTML = `<div class="wishlist-grid">${wishlist.map(p=>`
    <div class="wish-card">
      <div class="wish-thumb" style="background:${p.bg_gradient}">
        ${(p.photos&&p.photos[0])||p.image_url ? `<img src="${(p.photos&&p.photos[0])||p.image_url}" alt="${p.title||''}" style="width:100%;height:100%;object-fit:cover" onerror="this.remove()"/>` : ''}
        <button class="wish-remove" onclick="window.removeWish('${p.id}')">✕</button>
      </div>
      <div class="wish-body">
        <div class="wish-title">${p.title}</div>
        <div class="wish-price">₹${Number(p.price).toLocaleString('en-IN')}</div>
      </div>
    </div>`).join('')}</div>`;
}

function populateProfile() {
  // Restore gender selection if saved
  if (profile?.gender) selectGender(profile.gender);
  document.getElementById('p-name').value  = profile?.full_name || '';
  document.getElementById('p-phone').value = profile?.phone || '';
  document.getElementById('p-email').value = user.email || '';
  document.getElementById('p-avatar').value = profile?.avatar_url || '';
  document.getElementById('p-display-name').textContent  = profile?.full_name || 'Traveller';
  document.getElementById('p-display-email').textContent = user.email || '';
  updateAvatarPreview(profile?.avatar_url);
}

function updateAvatarPreview(url) {
  const img      = document.getElementById('big-avatar-img');
  const initials = document.getElementById('big-avatar-initials');
  if (!img || !initials) return;
  if (url) {
    img.src = url;
    img.style.display = 'block';
    initials.style.display = 'none';
  } else {
    img.style.display = 'none';
    initials.style.display = 'block';
    initials.textContent = (profile?.full_name || user.email || '?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  }
}

window.handlePhotoUpload = async (input) => {
  const file = input.files?.[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { toast('Please choose an image file', 'error'); return; }
  if (file.size > 5 * 1024 * 1024) { toast('Image must be under 5MB', 'error'); return; }

  const progress = document.getElementById('photo-upload-progress');
  const bar      = document.getElementById('upload-bar');
  if (progress) progress.style.display = 'block';
  if (bar) bar.style.width = '30%';

  try {
    const ext  = file.name.split('.').pop();
    const path = `avatars/${user.id}-${Date.now()}.${ext}`;
    const { error: upErr } = await supabase.storage.from('zoomfly-images').upload(path, file);
    if (upErr) throw upErr;
    if (bar) bar.style.width = '70%';
    const { data } = supabase.storage.from('zoomfly-images').getPublicUrl(path);
    const avatarUrl = data.publicUrl;

    document.getElementById('p-avatar').value = avatarUrl;
    updateAvatarPreview(avatarUrl);

    await updateProfile({ avatar_url: avatarUrl });
    profile = await getProfile();
    renderNav();
    if (bar) bar.style.width = '100%';
    toast('Profile photo updated', 'success');
  } catch (e) {
    toast('Photo upload failed: ' + (e?.message || 'please try again'), 'error');
  } finally {
    setTimeout(() => { if (progress) progress.style.display = 'none'; if (bar) bar.style.width = '0'; }, 800);
    input.value = '';
  }
};

// ── Global handlers ──
window.showSection = (id, el) => {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('section-'+id).classList.add('active');
  document.querySelectorAll('.dash-nav-item').forEach(n=>n.classList.remove('active'));
  el?.classList.add('active');
};

window.cancelBook = async (id) => {
  if (!confirm('Are you sure you want to cancel this booking?')) return;
  try {
    await cancelBooking(id, 'Cancelled by customer');
    toast('Booking cancelled successfully', 'success');
    bookings = await getMyBookings();
    renderRecentBookings(); renderBookings(); renderStats();
  } catch(e) { toast('Cancel failed: ' + e.message, 'error'); }
};

window.removeWish = async (packageId) => {
  try {
    await removeFromWishlist(packageId);
    wishlist = await getWishlist();
    renderWishlist(); renderStats();
    toast('Removed from wishlist', 'success');
  } catch(e) { toast(e.message, 'error'); }
};

// ── Gender selection ────────────────────────────────────────
let selectedGender = '';
window.selectGender = (g) => {
  selectedGender = g;
  ['male','female','other'].forEach(opt => {
    const btn = document.getElementById('g-' + opt);
    if (!btn) return;
    if (opt === g) {
      btn.style.borderColor = '#1a73e8';
      btn.style.background  = 'rgba(26,115,232,0.08)';
      btn.style.color       = '#1a73e8';
    } else {
      btn.style.borderColor = 'var(--border, #e2e8f0)';
      btn.style.background  = 'white';
      btn.style.color       = 'inherit';
    }
  });
};

window.saveProfile = async () => {
  const btn = document.querySelector('button[onclick="saveProfile()"]');
  const orig = btn?.textContent;
  if (btn) { btn.textContent = 'Saving...'; btn.disabled = true; }
  try {
    const updates = {
      full_name:  document.getElementById('p-name')?.value?.trim()   || '',
      phone:      document.getElementById('p-phone')?.value?.trim()  || '',
      avatar_url: document.getElementById('p-avatar')?.value?.trim() || null,
    };
    // Optional fields — add if inputs exist
    const dob    = document.getElementById('p-dob')?.value;
    const city   = document.getElementById('p-city')?.value?.trim();
    if (dob)    updates.date_of_birth = dob;
    if (city)   updates.city          = city;
    if (selectedGender) updates.gender = selectedGender;

    await updateProfile(updates);
    profile = await getProfile();
    renderNav();
    if (btn) { btn.textContent = 'Saved!'; btn.style.background = '#059669'; }
    setTimeout(() => {
      if (btn) { btn.textContent = orig; btn.style.background = ''; btn.disabled = false; }
    }, 2500);
  } catch(e) {
    toast('Update failed: ' + e.message, 'error');
    if (btn) { btn.textContent = orig; btn.disabled = false; }
  }
};

window.doLogout = async () => { await signOut(); };

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3500);
}

init();
</script>

<section class="newsletter" id="newsletter"></section>
<footer class="footer" id="mainFooter"></footer>
</body>
</html>
