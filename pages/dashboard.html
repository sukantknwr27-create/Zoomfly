<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg"/>
  <link rel="shortcut icon" href="/assets/favicon.svg"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Dashboard — ZoomFly</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --primary:#0057FF;--primary-dark:#0041CC;--primary-light:#EEF3FF;
      --accent:#FF6B35;--text:#111827;--text-muted:#6B7280;--text-light:#9CA3AF;
      --bg:#F1F5F9;--bg-white:#FFFFFF;--border:#E5E7EB;
      --success:#059669;--success-bg:#ECFDF5;--warning:#D97706;--warning-bg:#FFFBEB;
      --error:#DC2626;--error-bg:#FEF2F2;
      --shadow-sm:0 1px 3px rgba(0,0,0,0.07);--shadow:0 4px 12px rgba(0,0,0,0.08);
      --radius:12px;--radius-sm:8px;--font:'Segoe UI',system-ui,sans-serif;
    }
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
    a{text-decoration:none;color:inherit}

    /* NAV */
    nav{background:white;border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
    .nav-logo{font-size:1.4rem;font-weight:900;color:var(--primary)}.nav-logo span{color:var(--accent)}
    .nav-right{display:flex;align-items:center;gap:1rem}
    .user-pill{display:flex;align-items:center;gap:0.6rem;padding:0.4rem 0.85rem 0.4rem 0.5rem;border:1px solid var(--border);border-radius:50px;font-size:0.875rem;font-weight:600;cursor:pointer}
    .user-avatar{width:30px;height:30px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700}
    .btn-logout{font-size:0.8rem;color:var(--error);font-weight:600;cursor:pointer;border:none;background:none;padding:0.4rem 0.75rem;border:1px solid var(--error);border-radius:50px}

    /* LAYOUT */
    .dash-layout{max-width:1100px;margin:0 auto;padding:2rem;display:grid;grid-template-columns:220px 1fr;gap:2rem;align-items:start}
    
    /* SIDEBAR */
    .dash-sidebar{position:sticky;top:80px}
    .user-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;text-align:center;margin-bottom:1rem;box-shadow:var(--shadow-sm)}
    .user-big-avatar{width:64px;height:64px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;margin:0 auto 0.75rem}
    .user-name{font-size:1rem;font-weight:700;margin-bottom:0.2rem}
    .user-email{font-size:0.78rem;color:var(--text-muted)}
    .user-since{font-size:0.72rem;color:var(--text-light);margin-top:0.35rem}
    .dash-nav{background:white;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
    .dash-nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.85rem 1.25rem;font-size:0.875rem;font-weight:500;color:var(--text-muted);cursor:pointer;border-left:3px solid transparent;transition:all 0.15s}
    .dash-nav-item:hover{background:var(--bg);color:var(--text)}
    .dash-nav-item.active{color:var(--primary);background:var(--primary-light);border-left-color:var(--primary);font-weight:600}
    .dash-nav-item .icon{font-size:1rem;width:18px;text-align:center}
    .dash-nav-item .count{margin-left:auto;background:var(--primary);color:white;font-size:0.65rem;font-weight:700;padding:0.1rem 0.45rem;border-radius:50px}

    /* MAIN */
    .dash-main{}
    .section{display:none;animation:fadeIn 0.25s ease}
    .section.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

    /* STAT CARDS */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
    .stat-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;box-shadow:var(--shadow-sm)}
    .stat-icon{font-size:1.5rem;margin-bottom:0.5rem}
    .stat-val{font-size:1.5rem;font-weight:800;color:var(--text)}
    .stat-lbl{font-size:0.75rem;color:var(--text-muted)}

    /* SECTION HEADER */
    .sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
    .sec-hdr h2{font-size:1.05rem;font-weight:700}
    
    /* BOOKINGS */
    .booking-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow-sm);display:flex;gap:1.25rem;align-items:flex-start}
    .booking-emoji{width:52px;height:52px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.75rem;flex-shrink:0}
    .booking-info{flex:1}
    .booking-title{font-size:0.95rem;font-weight:700;margin-bottom:0.2rem}
    .booking-meta{font-size:0.78rem;color:var(--text-muted);display:flex;flex-wrap:wrap;gap:0.75rem;margin-bottom:0.5rem}
    .booking-ref{font-size:0.72rem;font-family:monospace;color:var(--primary);font-weight:700;background:var(--primary-light);padding:0.15rem 0.5rem;border-radius:4px}
    .booking-right{text-align:right;flex-shrink:0}
    .booking-amount{font-size:1.15rem;font-weight:800;color:var(--primary);margin-bottom:0.35rem}
    .status-pill{display:inline-block;padding:0.2rem 0.65rem;border-radius:50px;font-size:0.7rem;font-weight:700}
    .s-confirmed{background:var(--success-bg);color:var(--success)}
    .s-pending{background:var(--warning-bg);color:var(--warning)}
    .s-cancelled{background:var(--error-bg);color:var(--error)}
    .btn-cancel-booking{margin-top:0.5rem;font-size:0.72rem;color:var(--error);border:1px solid var(--error);background:none;padding:0.25rem 0.65rem;border-radius:50px;cursor:pointer;font-weight:600}

    /* WISHLIST */
    .wishlist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
    .wish-card{background:white;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;box-shadow:var(--shadow-sm);transition:box-shadow 0.2s}
    .wish-card:hover{box-shadow:var(--shadow)}
    .wish-thumb{height:110px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;position:relative}
    .wish-body{padding:0.85rem}
    .wish-title{font-size:0.875rem;font-weight:700;margin-bottom:0.25rem}
    .wish-price{font-size:1rem;font-weight:800;color:var(--primary)}
    .wish-remove{position:absolute;top:0.5rem;right:0.5rem;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.9);border:none;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center}

    /* PROFILE FORM */
    .profile-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;box-shadow:var(--shadow-sm)}
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;font-size:0.8rem;font-weight:600;margin-bottom:0.35rem;color:var(--text)}
    .fc{width:100%;padding:0.65rem 0.9rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;font-family:var(--font);color:var(--text);background:white;transition:border-color 0.2s}
    .fc:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,87,255,0.1)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.85rem}
    .btn-save{padding:0.7rem 1.75rem;background:var(--primary);color:white;border:none;border-radius:var(--radius-sm);font-size:0.9rem;font-weight:700;cursor:pointer;transition:background 0.2s}
    .btn-save:hover{background:var(--primary-dark)}

    /* EMPTY STATE */
    .empty{text-align:center;padding:3.5rem 1rem;color:var(--text-muted)}
    .empty .icon{font-size:3rem;margin-bottom:0.85rem}
    .empty h3{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:0.4rem}
    .btn-explore{display:inline-block;margin-top:1rem;padding:0.65rem 1.5rem;background:var(--primary);color:white;border-radius:50px;font-weight:700;font-size:0.875rem}

    /* TOAST */
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;padding:0.75rem 1.25rem;border-radius:var(--radius-sm);font-size:0.875rem;font-weight:600;color:white;box-shadow:var(--shadow);display:none;animation:slideUp 0.3s ease}
    .toast.show{display:block}
    .toast.success{background:var(--success)}
    .toast.error{background:var(--error)}
    @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

    /* LOADING */
    .spinner-wrap{text-align:center;padding:3rem;color:var(--text-muted)}
    .spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:768px){.dash-layout{grid-template-columns:1fr}.dash-sidebar{position:static}.stats-row{grid-template-columns:1fr 1fr}.booking-card{flex-direction:column}.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>

<nav>
  <a href="../index.html" class="nav-logo">Zoom<span>Fly</span> ✈</a>
  <div class="nav-right">
    <div class="user-pill">
      <div class="user-avatar" id="nav-avatar">?</div>
      <span id="nav-name">Loading...</span>
    </div>
    <button class="btn-logout" onclick="doLogout()">Log Out</button>
  </div>
</nav>

<div class="dash-layout">
  <!-- SIDEBAR -->
  <aside class="dash-sidebar">
    <div class="user-card">
      <div class="user-big-avatar" id="profile-avatar">?</div>
      <div class="user-name" id="profile-name">Loading...</div>
      <div class="user-email" id="profile-email"></div>
      <div class="user-since" id="profile-since"></div>
    </div>
    <div class="dash-nav">
      <div class="dash-nav-item active" onclick="showSection('overview',this)"><span class="icon">📊</span> Overview</div>
      <div class="dash-nav-item" onclick="showSection('bookings',this)"><span class="icon">🗓</span> My Bookings <span class="count" id="booking-count">0</span></div>
      <div class="dash-nav-item" onclick="showSection('wishlist',this)"><span class="icon">❤️</span> Wishlist</div>
      <div class="dash-nav-item" onclick="showSection('profile',this)"><span class="icon">👤</span> Profile</div>
      <div class="dash-nav-item" onclick="window.location.href='packages.html'"><span class="icon">🗺</span> Browse Packages</div>
      <div class="dash-nav-item" onclick="window.location.href='contact.html'"><span class="icon">📩</span> Get a Quote</div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="dash-main">

    <!-- OVERVIEW -->
    <div class="section active" id="section-overview">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-icon">🗓</div><div class="stat-val" id="stat-bookings">—</div><div class="stat-lbl">Total Bookings</div></div>
        <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-val" id="stat-spent">—</div><div class="stat-lbl">Total Spent</div></div>
        <div class="stat-card"><div class="stat-icon">❤️</div><div class="stat-val" id="stat-wishlist">—</div><div class="stat-lbl">Saved Packages</div></div>
      </div>

      <div class="sec-hdr"><h2>Recent Bookings</h2><a href="#" onclick="showSection('bookings',document.querySelector('[onclick*=bookings]'))" style="font-size:0.8rem;color:var(--primary);font-weight:600">View All →</a></div>
      <div id="recent-bookings-wrap"><div class="spinner-wrap"><div class="spinner"></div></div></div>
    </div>

    <!-- BOOKINGS -->
    <div class="section" id="section-bookings">
      <div class="sec-hdr"><h2>My Bookings</h2></div>
      <div id="bookings-wrap"><div class="spinner-wrap"><div class="spinner"></div></div></div>
    </div>

    <!-- WISHLIST -->
    <div class="section" id="section-wishlist">
      <div class="sec-hdr"><h2>Saved Packages</h2></div>
      <div id="wishlist-wrap"><div class="spinner-wrap"><div class="spinner"></div></div></div>
    </div>

    <!-- PROFILE -->
    <div class="section" id="section-profile">
      <div class="sec-hdr"><h2>Edit Profile</h2></div>
      <div class="profile-card">
        <div class="form-row">
          <div class="form-group"><label>Full Name</label><input type="text" class="fc" id="p-name" placeholder="Your full name"/></div>
          <div class="form-group"><label>Phone Number</label><input type="tel" class="fc" id="p-phone" placeholder="+91 8076136300"/></div>
        </div>
        <div class="form-group"><label>Email Address</label><input type="email" class="fc" id="p-email" placeholder="you@email.com" disabled style="background:var(--bg);color:var(--text-muted)"/></div>
        <div class="form-group"><label>Profile Photo URL</label><input type="url" class="fc" id="p-avatar" placeholder="https://..."/></div>
        <div style="display:flex;gap:1rem;margin-top:0.5rem">
          <button class="btn-save" onclick="saveProfile()">Save Changes</button>
          <button class="btn-save" onclick="doLogout()" style="background:var(--error)">Log Out</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import {
  supabase, getUser, getProfile, updateProfile,
  getMyBookings, cancelBooking,
  getWishlist, removeFromWishlist,
  signOut, requireAuth
} from './supabase.js';

// ── Guard ──
const user = await requireAuth();
if (!user) throw new Error('redirect');

let profile = null;
let bookings = [];
let wishlist = [];

// ── Init ──
async function init() {
  try {
    [profile, bookings, wishlist] = await Promise.all([
      getProfile(),
      getMyBookings(),
      getWishlist()
    ]);
    renderNav();
    renderStats();
    renderRecentBookings();
    renderBookings();
    renderWishlist();
    populateProfile();
  } catch (e) {
    toast('Failed to load dashboard: ' + e.message, 'error');
  }
}

function renderNav() {
  const initials = (profile?.full_name || user.email || '?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  document.getElementById('nav-avatar').textContent = initials;
  document.getElementById('nav-name').textContent = profile?.full_name || user.email;
  document.getElementById('profile-avatar').textContent = initials;
  document.getElementById('profile-name').textContent = profile?.full_name || 'Traveller';
  document.getElementById('profile-email').textContent = user.email;
  document.getElementById('profile-since').textContent = 'Member since ' + new Date(user.created_at).toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  document.getElementById('booking-count').textContent = bookings.length;
}

function renderStats() {
  document.getElementById('stat-bookings').textContent = bookings.length;
  const spent = bookings.filter(b=>b.payment_status==='paid').reduce((s,b)=>s+Number(b.total_amount),0);
  document.getElementById('stat-spent').textContent = spent > 0 ? '₹'+spent.toLocaleString('en-IN') : '₹0';
  document.getElementById('stat-wishlist').textContent = wishlist.length;
}

function bookingCard(b, showCancel = true) {
  const emoji = b.packages?.emoji || b.hotels?.emoji || '🗓';
  const title = b.packages?.title || b.hotels?.name || `${b.booking_type} Booking`;
  const bg = b.booking_type === 'package' ? '#EEF3FF' : '#ECFDF5';
  const statusCls = { confirmed:'s-confirmed', pending:'s-pending', cancelled:'s-cancelled' }[b.status] || 's-pending';
  const date = b.travel_date || b.checkin_date || b.created_at;
  return `
  <div class="booking-card">
    <div class="booking-emoji" style="background:${bg}">${emoji}</div>
    <div class="booking-info">
      <div class="booking-title">${title}</div>
      <div class="booking-meta">
        <span>📅 ${date ? new Date(date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—'}</span>
        <span>👥 ${b.num_guests} guest${b.num_guests!==1?'s':''}</span>
        <span class="booking-ref">${b.booking_ref}</span>
      </div>
      ${showCancel && b.status === 'confirmed' ? `<button class="btn-cancel-booking" onclick="window.cancelBook('${b.id}')">Cancel Booking</button>` : ''}
    </div>
    <div class="booking-right">
      <div class="booking-amount">₹${Number(b.total_amount).toLocaleString('en-IN')}</div>
      <span class="status-pill ${statusCls}">${b.status.charAt(0).toUpperCase()+b.status.slice(1)}</span>
    </div>
  </div>`;
}

function renderRecentBookings() {
  const wrap = document.getElementById('recent-bookings-wrap');
  if (!bookings.length) {
    wrap.innerHTML = `<div class="empty"><div class="icon">🗓</div><h3>No bookings yet</h3><p>Your confirmed trips will appear here.</p><a href="packages.html" class="btn-explore">Browse Packages</a></div>`;
    return;
  }
  wrap.innerHTML = bookings.slice(0,3).map(b => bookingCard(b, false)).join('');
}

function renderBookings() {
  const wrap = document.getElementById('bookings-wrap');
  if (!bookings.length) {
    wrap.innerHTML = `<div class="empty"><div class="icon">🗓</div><h3>No bookings yet</h3><p>Time to plan your first trip!</p><a href="packages.html" class="btn-explore">Browse Packages</a></div>`;
    return;
  }
  wrap.innerHTML = bookings.map(b => bookingCard(b)).join('');
}

function renderWishlist() {
  const wrap = document.getElementById('wishlist-wrap');
  if (!wishlist.length) {
    wrap.innerHTML = `<div class="empty"><div class="icon">❤️</div><h3>No saved packages</h3><p>Tap the heart icon on any package to save it here.</p><a href="packages.html" class="btn-explore">Browse Packages</a></div>`;
    return;
  }
  wrap.innerHTML = `<div class="wishlist-grid">${wishlist.map(p=>`
    <div class="wish-card">
      <div class="wish-thumb" style="background:${p.bg_gradient}">
        ${p.emoji}
        <button class="wish-remove" onclick="window.removeWish('${p.id}')">✕</button>
      </div>
      <div class="wish-body">
        <div class="wish-title">${p.title}</div>
        <div class="wish-price">₹${Number(p.price).toLocaleString('en-IN')}</div>
      </div>
    </div>`).join('')}</div>`;
}

function populateProfile() {
  document.getElementById('p-name').value  = profile?.full_name || '';
  document.getElementById('p-phone').value = profile?.phone || '';
  document.getElementById('p-email').value = user.email || '';
  document.getElementById('p-avatar').value = profile?.avatar_url || '';
}

// ── Global handlers ──
window.showSection = (id, el) => {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('section-'+id).classList.add('active');
  document.querySelectorAll('.dash-nav-item').forEach(n=>n.classList.remove('active'));
  el?.classList.add('active');
};

window.cancelBook = async (id) => {
  if (!confirm('Are you sure you want to cancel this booking?')) return;
  try {
    await cancelBooking(id, 'Cancelled by customer');
    toast('Booking cancelled successfully', 'success');
    bookings = await getMyBookings();
    renderRecentBookings(); renderBookings(); renderStats();
  } catch(e) { toast('Cancel failed: ' + e.message, 'error'); }
};

window.removeWish = async (packageId) => {
  try {
    await removeFromWishlist(packageId);
    wishlist = await getWishlist();
    renderWishlist(); renderStats();
    toast('Removed from wishlist', 'success');
  } catch(e) { toast(e.message, 'error'); }
};

window.saveProfile = async () => {
  try {
    await updateProfile({
      full_name: document.getElementById('p-name').value.trim(),
      phone: document.getElementById('p-phone').value.trim(),
      avatar_url: document.getElementById('p-avatar').value.trim(),
    });
    profile = await getProfile();
    renderNav();
    toast('Profile updated!', 'success');
  } catch(e) { toast('Update failed: ' + e.message, 'error'); }
};

window.doLogout = async () => { await signOut(); };

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3500);
}

init();
</script>
</body>
</html>
