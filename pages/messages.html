<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Messages — ZoomFly</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <style>
    body{background:#f8fafc;min-height:100vh}
    .page-wrap{max-width:1100px;margin:0 auto;padding:24px 16px 60px}
    .page-header{margin-bottom:24px}
    .page-header h1{font-size:1.5rem;font-weight:800;color:#0f1923;margin-bottom:4px}
    .page-header p{font-size:.875rem;color:#64748b}

    /* Layout */
    .msg-layout{display:grid;grid-template-columns:300px 1fr;gap:0;background:#fff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;min-height:600px}

    /* Thread list */
    .thread-list{border-right:1px solid #e2e8f0;display:flex;flex-direction:column}
    .thread-search{padding:14px;border-bottom:1px solid #e2e8f0}
    .thread-search input{width:100%;padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:.85rem;outline:none;font-family:inherit;box-sizing:border-box}
    .thread-search input:focus{border-color:#1a73e8}
    .threads{overflow-y:auto;flex:1}
    .thread-item{padding:14px 16px;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .15s;display:flex;gap:12px;align-items:flex-start}
    .thread-item:hover{background:#f8fafc}
    .thread-item.active{background:#eff6ff;border-left:3px solid #1a73e8}
    .thread-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1a73e8,#ff6b35);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;color:#fff;flex-shrink:0}
    .thread-info{flex:1;min-width:0}
    .thread-name{font-size:.875rem;font-weight:700;color:#0f1923;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .thread-preview{font-size:.78rem;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .thread-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
    .thread-time{font-size:.7rem;color:#94a3b8}
    .thread-badge{background:#1a73e8;color:#fff;font-size:.65rem;font-weight:700;border-radius:10px;padding:2px 7px;min-width:18px;text-align:center}
    .thread-empty{padding:40px 20px;text-align:center;color:#94a3b8;font-size:.85rem}

    /* Chat window */
    .chat-window{display:flex;flex-direction:column;background:#f8fafc}
    .chat-header{padding:16px 20px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:12px}
    .chat-header-info{flex:1}
    .chat-header-name{font-size:.95rem;font-weight:700;color:#0f1923}
    .chat-header-sub{font-size:.78rem;color:#64748b;margin-top:1px}
    .chat-header-actions{display:flex;gap:8px}
    .chat-action-btn{padding:6px 14px;border:1.5px solid #e2e8f0;border-radius:8px;background:#fff;font-size:.78rem;font-weight:600;color:#374151;cursor:pointer;transition:all .15s}
    .chat-action-btn:hover{border-color:#1a73e8;color:#1a73e8}

    /* Messages */
    .messages-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
    .msg-bubble-wrap{display:flex;gap:8px;align-items:flex-end}
    .msg-bubble-wrap.mine{flex-direction:row-reverse}
    .msg-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#64748b,#94a3b8);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;flex-shrink:0}
    .msg-bubble{max-width:70%;padding:10px 14px;border-radius:16px;font-size:.875rem;line-height:1.5;word-break:break-word}
    .msg-bubble.theirs{background:#fff;border:1px solid #e2e8f0;border-bottom-left-radius:4px;color:#0f1923}
    .msg-bubble.mine{background:#1a73e8;color:#fff;border-bottom-right-radius:4px}
    .msg-time{font-size:.65rem;color:#94a3b8;margin-top:3px;text-align:right}
    .msg-time.theirs{text-align:left}

    /* Date divider */
    .date-divider{text-align:center;font-size:.72rem;color:#94a3b8;padding:4px 0;display:flex;align-items:center;gap:10px}
    .date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:#e2e8f0}

    /* Typing indicator */
    .typing-indicator{display:flex;align-items:center;gap:4px;padding:10px 14px;background:#fff;border:1px solid #e2e8f0;border-radius:16px;width:fit-content}
    .typing-dot{width:6px;height:6px;border-radius:50%;background:#94a3b8;animation:typingBounce 1.2s infinite}
    .typing-dot:nth-child(2){animation-delay:.2s}
    .typing-dot:nth-child(3){animation-delay:.4s}
    @keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

    /* Input area */
    .chat-input-area{padding:14px 16px;background:#fff;border-top:1px solid #e2e8f0;display:flex;gap:10px;align-items:flex-end}
    .chat-textarea{flex:1;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:12px;font-size:.875rem;font-family:inherit;resize:none;outline:none;min-height:42px;max-height:120px;line-height:1.5;transition:border .2s}
    .chat-textarea:focus{border-color:#1a73e8}
    .send-btn{width:42px;height:42px;border-radius:12px;background:#1a73e8;border:none;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
    .send-btn:hover{background:#1557b0}
    .send-btn:disabled{background:#94a3b8;cursor:not-allowed}

    /* Empty state */
    .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94a3b8;gap:12px}
    .chat-empty-icon{font-size:3rem}
    .chat-empty h3{font-size:1rem;font-weight:700;color:#374151;margin:0}
    .chat-empty p{font-size:.85rem;margin:0;text-align:center;max-width:240px}

    /* Toast */
    .toast{position:fixed;bottom:24px;right:24px;background:#0f1923;color:#fff;padding:10px 18px;border-radius:10px;font-size:.85rem;font-weight:600;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s}
    .toast.show{transform:translateY(0);opacity:1}

    /* Booking ref tag */
    .booking-tag{display:inline-flex;align-items:center;gap:6px;background:#eff6ff;color:#1a73e8;font-size:.72rem;font-weight:700;border-radius:6px;padding:3px 8px;margin-bottom:6px}

    /* Responsive */
    @media(max-width:700px){
      .msg-layout{grid-template-columns:1fr;min-height:auto}
      .thread-list{display:none}
      .thread-list.mobile-show{display:flex;position:fixed;inset:0;z-index:200;background:#fff;border-radius:0}
      .back-btn{display:flex}
    }
    .back-btn{display:none;align-items:center;gap:6px;background:none;border:none;font-size:.85rem;font-weight:600;color:#1a73e8;cursor:pointer;padding:0}
  </style>
</head>
<body>
<nav class="navbar" id="mainNav"></nav>

<div class="page-wrap">
  <div class="page-header">
    <h1>💬 Messages</h1>
    <p>Chat with ZoomFly support about your bookings</p>
  </div>

  <div class="msg-layout">
    <!-- Thread list -->
    <div class="thread-list" id="threadList">
      <div class="thread-search">
        <input type="text" id="threadSearch" placeholder="🔍 Search conversations..." oninput="filterThreads(this.value)"/>
      </div>
      <div class="threads" id="threads">
        <div class="thread-empty">⏳ Loading conversations...</div>
      </div>
    </div>

    <!-- Chat window -->
    <div class="chat-window" id="chatWindow">
      <div class="chat-empty" id="chatEmpty">
        <div class="chat-empty-icon">💬</div>
        <h3>Your Messages</h3>
        <p>Select a conversation or start a new one by contacting support about a booking</p>
        <button class="btn-primary" style="margin-top:8px" onclick="newConversation()">✉️ New Message</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>window.SUPABASE_URL='https://ndaurluolurdljrjbxii.supabase.co';window.SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kYXVybHVvbHVyZGxqcmpieGlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDY2MzksImV4cCI6MjA5MzQ4MjYzOX0.JsZXOof19JkyX7asJQ7EtoaBKqURJUYzVqXQIenCzjQ';</script>
<script src="/assets/js/main.js"></script>
<script type="module">
import { supabase, getUser, loadNav } from '../assets/js/supabase.js';
loadNav();

let currentUser = null;
let activeBookingId = null;
let allThreads = [];
let messageChannel = null;
let typingTimer = null;

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  currentUser = await getUser();
  if (!currentUser) { window.location.href = '/pages/login.html?next=/pages/messages.html'; return; }
  await loadThreads();
  // Check URL param for direct booking link
  const params = new URLSearchParams(location.search);
  if (params.get('booking')) openThread(params.get('booking'));
}

// ── LOAD THREADS ──────────────────────────────────────────────
async function loadThreads() {
  const { data: bookings } = await supabase
    .from('bookings')
    .select('id, booking_ref, service_name, status, travel_date')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });

  if (!bookings?.length) {
    document.getElementById('threads').innerHTML =
      '<div class="thread-empty">No bookings yet.<br><a href="/pages/packages.html" style="color:#1a73e8;font-weight:600">Browse packages →</a></div>';
    return;
  }

  // Get last message + unread count per booking
  const bookingIds = bookings.map(b => b.id);
  const { data: msgs } = await supabase
    .from('messages')
    .select('*')
    .in('booking_id', bookingIds)
    .order('created_at', { ascending: false });

  allThreads = bookings.map(b => {
    const threadMsgs = (msgs||[]).filter(m => m.booking_id === b.id);
    const last = threadMsgs[0];
    const unread = threadMsgs.filter(m => m.sender_role === 'admin' && !m.read).length;
    return { ...b, lastMsg: last, unread };
  });

  renderThreads(allThreads);
}

function renderThreads(threads) {
  const el = document.getElementById('threads');
  if (!threads.length) { el.innerHTML = '<div class="thread-empty">No conversations found</div>'; return; }
  el.innerHTML = threads.map(t => `
    <div class="thread-item ${activeBookingId===t.id?'active':''}" onclick="openThread('${t.id}')">
      <div class="thread-avatar">${(t.service_name||'T')[0]}</div>
      <div class="thread-info">
        <div class="thread-name">${t.booking_ref||'Booking'}</div>
        <div class="thread-preview">${t.lastMsg ? t.lastMsg.content.slice(0,50)+(t.lastMsg.content.length>50?'…':'') : t.service_name||'No messages yet'}</div>
      </div>
      <div class="thread-meta">
        <div class="thread-time">${t.lastMsg ? fmtTime(t.lastMsg.created_at) : fmtDate(t.travel_date)}</div>
        ${t.unread ? `<div class="thread-badge">${t.unread}</div>` : ''}
      </div>
    </div>`).join('');
}

window.filterThreads = (q) => {
  const filtered = allThreads.filter(t =>
    (t.booking_ref||'').toLowerCase().includes(q.toLowerCase()) ||
    (t.service_name||'').toLowerCase().includes(q.toLowerCase()));
  renderThreads(filtered);
};

// ── OPEN THREAD ───────────────────────────────────────────────
window.openThread = async (bookingId) => {
  activeBookingId = bookingId;
  const thread = allThreads.find(t => t.id === bookingId);

  // Unsubscribe previous channel
  if (messageChannel) supabase.removeChannel(messageChannel);

  // Mark admin messages as read
  await supabase.from('messages')
    .update({ read: true })
    .eq('booking_id', bookingId)
    .eq('sender_role', 'admin');

  // Re-render threads to clear unread badge
  if (thread) thread.unread = 0;
  renderThreads(allThreads);

  // Load messages
  const { data: msgs } = await supabase
    .from('messages')
    .select('*')
    .eq('booking_id', bookingId)
    .order('created_at', { ascending: true });

  renderChatWindow(thread, msgs || []);

  // Subscribe to realtime
  messageChannel = supabase.channel(`messages:${bookingId}`)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'messages',
      filter: `booking_id=eq.${bookingId}`
    }, (payload) => {
      appendMessage(payload.new);
      if (payload.new.sender_role === 'admin') {
        supabase.from('messages').update({ read: true }).eq('id', payload.new.id);
      }
    })
    .subscribe();
};

function renderChatWindow(thread, msgs) {
  const win = document.getElementById('chatWindow');
  win.innerHTML = `
    <div class="chat-header">
      <button class="back-btn" onclick="showThreadList()">← Back</button>
      <div class="thread-avatar" style="width:36px;height:36px;font-size:.78rem">${thread?(thread.service_name||'B')[0]:'Z'}</div>
      <div class="chat-header-info">
        <div class="chat-header-name">${thread?.booking_ref||'Booking'}</div>
        <div class="chat-header-sub">${thread?.service_name||''} · ${thread?.status||''}</div>
      </div>
      <div class="chat-header-actions">
        <button class="chat-action-btn" onclick="window.open('https://wa.me/918076136300','_blank')">📱 WhatsApp</button>
        <button class="chat-action-btn" onclick="window.location.href='/pages/my-bookings.html'">📋 Booking</button>
      </div>
    </div>
    <div class="messages-body" id="messagesBody">
      ${renderMessages(msgs)}
    </div>
    <div class="chat-input-area">
      <textarea class="chat-textarea" id="msgInput" placeholder="Type your message…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>`;

  scrollToBottom();
}

function renderMessages(msgs) {
  if (!msgs.length) return `<div class="chat-empty" style="flex:1">
    <div class="chat-empty-icon">👋</div>
    <h3>Start the conversation</h3>
    <p>Ask us anything about your booking — changes, queries, or special requests</p>
  </div>`;

  let html = '';
  let lastDate = '';
  msgs.forEach(m => {
    const d = new Date(m.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
    if (d !== lastDate) {
      html += `<div class="date-divider">${d}</div>`;
      lastDate = d;
    }
    const isMe = m.sender_id === currentUser?.id;
    html += `
      <div class="msg-bubble-wrap ${isMe?'mine':''}" id="msg-${m.id}">
        ${!isMe?`<div class="msg-avatar">ZF</div>`:''}
        <div>
          <div class="msg-bubble ${isMe?'mine':'theirs'}">${escHtml(m.content)}</div>
          <div class="msg-time ${isMe?'':'theirs'}">${fmtTime(m.created_at)}${isMe?' ✓✓':''}</div>
        </div>
      </div>`;
  });
  return html;
}

function appendMessage(msg) {
  const body = document.getElementById('messagesBody');
  if (!body) return;
  // Remove empty state if present
  const empty = body.querySelector('.chat-empty');
  if (empty) empty.remove();

  const isMe = msg.sender_id === currentUser?.id;
  const wrap = document.createElement('div');
  wrap.className = `msg-bubble-wrap ${isMe?'mine':''}`;
  wrap.id = `msg-${msg.id}`;
  wrap.innerHTML = `
    ${!isMe?`<div class="msg-avatar">ZF</div>`:''}
    <div>
      <div class="msg-bubble ${isMe?'mine':'theirs'}">${escHtml(msg.content)}</div>
      <div class="msg-time ${isMe?'':'theirs'}">${fmtTime(msg.created_at)}${isMe?' ✓✓':''}</div>
    </div>`;
  body.appendChild(wrap);

  // Update thread preview
  const thread = allThreads.find(t => t.id === msg.booking_id);
  if (thread) { thread.lastMsg = msg; if (!isMe) thread.unread = (thread.unread||0)+1; }
  renderThreads(allThreads);
  scrollToBottom();
}

// ── SEND MESSAGE ──────────────────────────────────────────────
window.sendMessage = async () => {
  const input = document.getElementById('msgInput');
  const content = input?.value.trim();
  if (!content || !activeBookingId) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  const { error } = await supabase.from('messages').insert({
    booking_id: activeBookingId,
    sender_id: currentUser.id,
    sender_role: 'user',
    content
  });

  if (error) { showToast('❌ Failed to send message'); input.value = content; }
  btn.disabled = false;
};

window.handleKey = (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
};

window.autoResize = (el) => {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};

window.newConversation = () => {
  window.location.href = '/pages/my-bookings.html';
};

// ── UTILS ─────────────────────────────────────────────────────
function scrollToBottom() {
  setTimeout(() => {
    const body = document.getElementById('messagesBody');
    if (body) body.scrollTop = body.scrollHeight;
  }, 50);
}

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const isToday = d.toDateString() === now.toDateString();
  return isToday
    ? d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })
    : d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
}

function fmtDate(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}

function escHtml(t) {
  return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

window.showThreadList = () => {
  document.getElementById('threadList').classList.add('mobile-show');
};

init();
</script>
</body>
</html>
