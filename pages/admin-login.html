<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Admin Login — ZoomFly</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#0f1923;min-height:100vh;
         display:flex;align-items:center;justify-content:center;padding:20px;}

    .card{background:#fff;border-radius:20px;padding:44px 40px;width:100%;max-width:420px;
          box-shadow:0 32px 80px rgba(0,0,0,.4);}

    .brand{text-align:center;margin-bottom:32px;}
    .brand-logo{font-size:1.6rem;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;}
    .brand-logo span{color:#ff6b35;}
    .brand-badge{display:inline-flex;align-items:center;gap:6px;background:#fef3c7;
      color:#92400e;font-size:.72rem;font-weight:700;padding:3px 12px;
      border-radius:20px;letter-spacing:.06em;text-transform:uppercase;}

    h2{font-size:1.3rem;font-weight:700;color:#0f1923;margin-bottom:6px;text-align:center;}
    .sub{font-size:.84rem;color:#64748b;text-align:center;margin-bottom:28px;}

    .alert{padding:10px 14px;border-radius:8px;font-size:.83rem;margin-bottom:18px;display:none;}
    .alert.error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;}
    .alert.warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e;}
    .alert.show{display:block;}

    .fg{margin-bottom:16px;}
    label{display:block;font-size:.78rem;font-weight:600;color:#374151;margin-bottom:6px;
          text-transform:uppercase;letter-spacing:.05em;}
    input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;
          font-size:.92rem;font-family:inherit;outline:none;transition:border .2s;color:#0f1923;}
    input:focus{border-color:#1a73e8;}
    .pw-wrap{position:relative;}
    .pw-wrap input{padding-right:44px;}
    .pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);
            background:none;border:none;cursor:pointer;font-size:1rem;color:#94a3b8;}

    .btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:.95rem;
         font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:6px;}
    .btn-primary{background:#1a73e8;color:#fff;}
    .btn-primary:hover{background:#1557b0;}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;}

    .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
          border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;
          vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg)}}

    .divider{border:none;border-top:1px solid #f1f5f9;margin:22px 0;}

    .back-link{text-align:center;font-size:.82rem;color:#94a3b8;margin-top:18px;}
    .back-link a{color:#1a73e8;text-decoration:none;font-weight:600;}

    .security-note{display:flex;align-items:center;gap:8px;background:#f8fafc;
      border-radius:8px;padding:10px 14px;font-size:.76rem;color:#64748b;margin-top:16px;}
  </style>

</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-logo">Zoom<span>Fly</span> ✈</div>
    <div class="brand-badge">🔐 Admin Portal</div>
  </div>

  <h2>Admin Sign In</h2>
  <p class="sub">Restricted access. Authorised personnel only.</p>

  <!-- Alerts -->
  <div class="alert warn" id="alert-reason"></div>
  <div class="alert error" id="alert-error"></div>

  <!-- Form -->
  <div class="fg">
    <label>Admin Email</label>
    <input type="email" id="email" placeholder="admin@zoomfly.in" autocomplete="email"/>
  </div>
  <div class="fg">
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="Enter admin password" autocomplete="current-password"/>
      <button class="pw-eye" onclick="togglePw()" type="button">👁</button>
    </div>
  </div>

  <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Sign In to Admin</button>

  <hr class="divider"/>

  <div class="security-note">
    🔒 This is a secure admin area. All access attempts are logged. Unauthorised access is prohibited.
  </div>

  <div class="back-link">
    Not an admin? <a href="/index.html">Back to ZoomFly</a>
  </div>
</div>

<script type="module">
import { supabase } from '../assets/js/supabase.js';

// Show reason if redirected here
const params = new URLSearchParams(location.search);
const reason = params.get('reason');
const reasonEl = document.getElementById('alert-reason');
if (reason === 'access_denied') {
  reasonEl.textContent = '⚠️ Access denied. Admin credentials required.';
  reasonEl.classList.add('show');
} else if (reason === 'auth_required') {
  reasonEl.textContent = '⚠️ Please sign in to access the admin panel.';
  reasonEl.classList.add('show');
}

// Check if already logged in as admin
const { data: { user } } = await supabase.auth.getUser();
if (user) {
  const role = user.app_metadata?.role || user.user_metadata?.role;
  if (role === 'admin') {
    window.location.replace('/pages/admin.html');
  } else {
    // Check profiles table
    const { data: prof } = await supabase.from('profiles').select('role').eq('id', user.id).single();
    if (prof?.role === 'admin') window.location.replace('/pages/admin.html');
  }
}

window.togglePw = () => {
  const inp = document.getElementById('password');
  const btn = document.querySelector('.pw-eye');
  inp.type  = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
};

window.doLogin = async () => {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  const errEl    = document.getElementById('alert-error');

  if (!email || !password) {
    errEl.textContent = 'Please enter your email and password.';
    errEl.classList.add('show');
    return;
  }

  btn.disabled    = true;
  btn.innerHTML   = '<span class="spin"></span> Signing in...';
  errEl.classList.remove('show');
  reasonEl.classList.remove('show');

  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;

    const user = data.user;

    // Verify admin role — check app_metadata first, then profiles
    const metaRole = user.app_metadata?.role || user.user_metadata?.role;
    let isAdmin    = metaRole === 'admin';

    if (!isAdmin) {
      const { data: prof } = await supabase.from('profiles')
        .select('role').eq('id', user.id).single();
      isAdmin = prof?.role === 'admin';
    }

    if (!isAdmin) {
      // Sign them back out — they're not admin
      await supabase.auth.signOut();
      errEl.textContent = '❌ Access denied. This account does not have admin privileges.';
      errEl.classList.add('show');
      btn.disabled    = false;
      btn.innerHTML   = 'Sign In to Admin';
      return;
    }

    // ✅ Admin confirmed — redirect
    btn.innerHTML = '✅ Access granted! Redirecting...';
    btn.style.background = '#16a34a';
    setTimeout(() => window.location.replace('/pages/admin.html'), 800);

  } catch (e) {
    errEl.textContent = e.message === 'Invalid login credentials'
      ? '❌ Incorrect email or password. Please try again.'
      : `❌ ${e.message || 'Login failed. Please try again.'}`;
    errEl.classList.add('show');
    btn.disabled  = false;
    btn.innerHTML = 'Sign In to Admin';
  }
};

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
