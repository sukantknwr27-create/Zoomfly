<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login — ZoomFly</title>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:linear-gradient(145deg,#060F1C 0%,#0C1B33 55%,#1a2d4a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
    body::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,0.04) 1px,transparent 0);background-size:40px 40px;pointer-events:none}
    body::after{content:'';position:absolute;top:-200px;right:-200px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(201,146,42,0.08),transparent 70%);pointer-events:none}
    .card{background:#fff;border-radius:20px;width:100%;max-width:420px;padding:44px 40px;box-shadow:0 32px 80px rgba(0,0,0,0.5);position:relative;z-index:2}
    .logo-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px}
    .logo-zoom{font-family:'Space Grotesk',system-ui;font-weight:800;font-size:1.6rem;color:#0C1B33;letter-spacing:-.5px}
    .logo-fly{font-family:'Space Grotesk',system-ui;font-weight:800;font-size:1.6rem;color:#C9922A;letter-spacing:-.5px}
    .badge{display:block;text-align:center;font-family:'Space Grotesk',system-ui;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:#8896AB;margin-bottom:28px}
    h2{font-family:'Space Grotesk',system-ui;font-size:1.25rem;font-weight:700;color:#0C1B33;margin-bottom:6px;text-align:center}
    .sub{font-size:.83rem;color:#8896AB;text-align:center;margin-bottom:28px}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-family:'Space Grotesk',system-ui;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#4A5568;margin-bottom:7px}
    .form-group input{width:100%;padding:11px 14px;border:1.5px solid #E4E8EF;border-radius:10px;font-size:.88rem;font-family:'Inter',system-ui;color:#0C1B33;transition:all .2s;outline:none;background:#fff}
    .form-group input:focus{border-color:#C9922A;box-shadow:0 0 0 3px rgba(201,146,42,.12)}
    .pw-wrap{position:relative}
    .pw-wrap input{padding-right:42px}
    .pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;color:#8896AB;padding:4px}
    .forgot{display:block;text-align:right;font-size:.78rem;color:#C9922A;text-decoration:none;margin-top:4px;font-weight:500}
    .forgot:hover{color:#E8B84B}
    .btn-login{width:100%;padding:13px;background:#C9922A;color:#0C1B33;border:none;border-radius:100px;font-family:'Space Grotesk',system-ui;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .22s;box-shadow:0 4px 18px rgba(201,146,42,.35);margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-login:hover:not(:disabled){background:#E8B84B;transform:translateY(-1px)}
    .btn-login:disabled{opacity:.7;cursor:not-allowed;transform:none}
    .alert{display:none;padding:11px 14px;border-radius:10px;font-size:.82rem;font-weight:500;margin-bottom:16px}
    .alert.show{display:block}
    .alert-error{background:#FCEBEB;color:#A32D2D;border:1px solid rgba(163,45,45,.2)}
    .alert-warn{background:#FEF3C7;color:#92400E;border:1px solid rgba(146,64,14,.2)}
    .alert-success{background:#D1FAE5;color:#065F46;border:1px solid rgba(6,95,70,.2)}
    .divider{border:none;border-top:1px solid #E4E8EF;margin:22px 0}
    .trust-row{display:flex;align-items:center;justify-content:center;gap:6px;font-size:.72rem;color:#8896AB}
    .trust-dot{width:6px;height:6px;border-radius:50%;background:#0E9F6E}
    .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(12,27,51,.3);border-top-color:#0C1B33;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .back-link{text-align:center;margin-top:20px}
    .back-link a{font-size:.8rem;color:rgba(255,255,255,.55);text-decoration:none;transition:color .2s}
    .back-link a:hover{color:#E8B84B}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <span class="logo-zoom">Zoom</span><span class="logo-fly">Fly</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="color:#C9922A;margin-left:2px"><path d="M21 3L3 10.5L10 13.5L13 21L21 3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M10 13.5L14 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </div>
    <span class="badge">Admin Portal</span>

    <h2>Welcome Back</h2>
    <p class="sub">Sign in to manage your travel platform</p>

    <div class="alert alert-warn" id="alert-reason"></div>
    <div class="alert alert-error" id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="admin@zoomfly.in" autocomplete="email"
             onkeydown="if(event.key==='Enter')document.getElementById('password').focus()"/>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
               onkeydown="if(event.key==='Enter')doLogin()"/>
        <button class="pw-eye" onclick="togglePw()" type="button" tabindex="-1">👁</button>
      </div>
      <a class="forgot" href="#" onclick="doForgot();return false">Forgot password?</a>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      Sign In to Admin
    </button>

    <hr class="divider"/>
    <div class="trust-row">
      <div class="trust-dot"></div>
      <span>Secure admin access · Sessions expire in 8 hours</span>
    </div>
  </div>

  <div class="back-link">
    <a href="/">← Back to ZoomFly website</a>
  </div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

// Inline Supabase init — admin-login must be fully self-contained
// (doesn't depend on main supabase.js which may not be loaded yet)
const SUPABASE_URL  = 'https://ndaurluolurdljrjbxii.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kYXVybHVvbHVyZGxqcmpieGlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDY2MzksImV4cCI6MjA5MzQ4MjYzOX0.JsZXOof19JkyX7asJQ7EtoaBKqURJUYzVqXQIenCzjQ';

const sb = createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    storageKey: 'zoomfly-auth',
    storage: window.localStorage,
  }
});

// ── Show reason message if redirected ───────────────────────
const params   = new URLSearchParams(location.search);
const reason   = params.get('reason');
const reasonEl = document.getElementById('alert-reason');
if (reason === 'access_denied') {
  reasonEl.textContent = '⚠️ Access denied. Admin credentials required.';
  reasonEl.classList.add('show');
} else if (reason === 'auth_required') {
  reasonEl.textContent = '⚠️ Please sign in to continue.';
  reasonEl.classList.add('show');
} else if (reason === 'session_expired') {
  reasonEl.textContent = '⚠️ Your session has expired. Please sign in again.';
  reasonEl.classList.add('show');
} else if (reason === 'timeout') {
  reasonEl.textContent = '⚠️ Connection timed out while verifying your session. Please sign in again.';
  reasonEl.classList.add('show');
}

// ── Auto-redirect if already logged in as admin ─────────────
(async () => {
  try {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return; // not logged in — show form

    const isAdmin = await checkAdminRole(sb, user);
    if (isAdmin) {
      window.location.replace('/pages/admin.html');
    }
  } catch(e) {
    console.warn('[AdminLogin] Session check failed:', e.message);
  }
})();

// ── Helpers ─────────────────────────────────────────────────
async function checkAdminRole(client, user) {
  // Check app_metadata first (set server-side — most reliable)
  const metaRole = user.app_metadata?.role || user.user_metadata?.role;
  if (metaRole === 'admin') return true;
  // Fallback: check profiles table
  try {
    const { data } = await client.from('profiles').select('role').eq('id', user.id).single();
    return data?.role === 'admin';
  } catch { return false; }
}

function showError(msg) {
  const el = document.getElementById('alert-error');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
}
function hideAlerts() {
  ['alert-error','alert-success','alert-reason'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('show');
  });
}

// ── Login ────────────────────────────────────────────────────
window.doLogin = async () => {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');

  hideAlerts();

  if (!email || !password) {
    showError('Please enter your email address and password.');
    return;
  }

  btn.disabled   = true;
  btn.innerHTML  = '<span class="spin"></span> Signing in…';

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw error;

    const isAdmin = await checkAdminRole(sb, data.user);
    if (!isAdmin) {
      await sb.auth.signOut();
      btn.disabled  = false;
      btn.innerHTML = 'Sign In to Admin';
      showError('❌ Access denied. This account does not have admin privileges.\n\nContact your system administrator.');
      return;
    }

    // ✅ Admin confirmed
    const successEl = document.getElementById('alert-success');
    successEl.textContent = '✅ Access granted! Redirecting to dashboard…';
    successEl.classList.add('show');
    btn.innerHTML = '✅ Redirecting…';
    btn.style.background = '#0E9F6E';
    btn.style.color = '#fff';

    setTimeout(() => window.location.replace('/pages/admin.html'), 900);

  } catch (err) {
    btn.disabled  = false;
    btn.innerHTML = 'Sign In to Admin';
    const msg = err.message || '';
    if (msg.includes('Invalid login credentials')) {
      showError('❌ Incorrect email or password. Please try again.');
    } else if (msg.includes('Email not confirmed')) {
      showError('❌ Please confirm your email address before signing in.');
    } else if (msg.includes('Too many requests')) {
      showError('⚠️ Too many attempts. Please wait a few minutes before trying again.');
    } else {
      showError('❌ Sign in failed: ' + msg);
    }
  }
};

// ── Forgot password ──────────────────────────────────────────
window.doForgot = async () => {
  const email = document.getElementById('email').value.trim();
  if (!email) {
    showError('Enter your email address above first, then click "Forgot password?".');
    return;
  }
  try {
    await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/pages/admin-login.html?reason=password_reset',
    });
    const successEl = document.getElementById('alert-success');
    successEl.textContent = '📧 Password reset email sent! Check your inbox.';
    successEl.classList.add('show');
  } catch(e) {
    showError('Could not send reset email: ' + e.message);
  }
};

// ── Toggle password visibility ───────────────────────────────
window.togglePw = () => {
  const inp = document.getElementById('password');
  const btn = document.querySelector('.pw-eye');
  inp.type      = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
};
</script>
</body>
</html>
