<script>
function toggleFaq(el) { el.classList.toggle('open'); el.nextElementSibling.classList.toggle('open'); }
</script>
<script type="module">
import { supabase } from '/assets/js/supabase.js';

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

(async () => {
  const contentEl = document.getElementById('faqContent');
  const navEl = document.getElementById('faqNav');
  try {
    const { data, error } = await supabase
      .from('faqs')
      .select('*')
      .eq('is_published', true)
      .order('section')
      .order('sort_order');
    if (error) throw error;

    if (!data?.length) {
      contentEl.innerHTML = '<div style="text-align:center;padding:60px 0;color:var(--text-muted)">No FAQs published yet.</div>';
      return;
    }

    // Group flat rows into sections, preserving first-seen order
    const sections = [];
    const bySection = {};
    for (const row of data) {
      if (!bySection[row.section]) {
        bySection[row.section] = { label: row.section_label, items: [] };
        sections.push(row.section);
      }
      bySection[row.section].items.push(row);
    }

    contentEl.innerHTML = sections.map(key => {
      const s = bySection[key];
      return `
        <div class="faq-section" id="${esc(key)}">
          <h2>${esc(s.label)}</h2>
          ${s.items.map(item => `
            <div class="faq-item">
              <div class="faq-q" onclick="toggleFaq(this)"><span>${esc(item.question)}</span><span class="faq-arrow">▼</span></div>
              <div class="faq-a"><p>${esc(item.answer)}</p></div>
            </div>`).join('')}
        </div>`;
    }).join('');

    navEl.innerHTML = sections.map((key, i) => `
      <a href="#${esc(key)}" class="faq-nav-link${i===0?' active':''}">${esc(bySection[key].label)}</a>
    `).join('');

    // Highlight the nav link matching the section currently in view
    const navLinks = [...navEl.querySelectorAll('.faq-nav-link')];
    const sectionEls = sections.map(key => document.getElementById(key));
    window.addEventListener('scroll', () => {
      let current = sectionEls[0];
      for (const el of sectionEls) {
        if (el && el.getBoundingClientRect().top < 140) current = el;
      }
      navLinks.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#'+current?.id));
    }, { passive: true });

    // Regenerate the FAQPage schema from the live data instead of the old hardcoded 5-question version
    const schema = {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": data.map(f => ({
        "@type": "Question",
        "name": f.question,
        "acceptedAnswer": { "@type": "Answer", "text": f.answer }
      }))
    };
    const existingSchema = document.querySelector('script[type="application/ld+json"]');
    if (existingSchema) existingSchema.textContent = JSON.stringify(schema);
  } catch (e) {
    contentEl.innerHTML = '<div style="text-align:center;padding:60px 0;color:var(--text-muted)">Couldn\'t load FAQs right now. Please try again shortly.</div>';
    console.error('Failed to load FAQs:', e);
  }
})();
</script>
