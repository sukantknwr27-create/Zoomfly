<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Background pill (optional, remove if transparent needed) -->
  <!-- Text: ZoomFly -->
  <text x="0" y="44" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="900" letter-spacing="-1">
    <tspan fill="#1B4F8A">Zoom</tspan><tspan fill="#FFD700">Fly</tspan>
  </text>
  <!-- Plane icon -->
  <g transform="translate(155, 8) rotate(-35, 22, 22)">
    <!-- Main body -->
    <path d="M38 4 L8 20 L16 24 L14 36 L20 32 L22 38 L28 34 L26 28 L38 24 Z" fill="#1B4F8A" opacity="0.95"/>
    <!-- Wing highlight -->
